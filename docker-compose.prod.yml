services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    restart: unless-stopped
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////app/data/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /app/mlruns
    volumes:
      - mlflow_data:/app/data
      - mlruns_data:/app/mlruns

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      IBERGRID_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      IBERGRID_DATA_ROOT: /app/data
      IBERGRID_ARTIFACTS_ROOT: /app/artifacts
      IBERGRID_MLFLOW_TRACKING_URI: http://mlflow:5000
      IBERGRID_MLFLOW_EXPERIMENT_NAME: ${IBERGRID_MLFLOW_EXPERIMENT_NAME:-ibergrid-production}
      IBERGRID_HORIZON_HOURS: ${IBERGRID_HORIZON_HOURS:-168}
      IBERGRID_ENCODER_HOURS: ${IBERGRID_ENCODER_HOURS:-336}
      IBERGRID_RETRAIN_BATCH_SIZE: ${IBERGRID_RETRAIN_BATCH_SIZE:-64}
      IBERGRID_RETRAIN_NUM_WORKERS: ${IBERGRID_RETRAIN_NUM_WORKERS:-2}
      IBERGRID_RETRAIN_EPOCHS: ${IBERGRID_RETRAIN_EPOCHS:-8}
      IBERGRID_WORKER_REFRESH_DAYS: ${IBERGRID_WORKER_REFRESH_DAYS:-30}
      IBERGRID_WORKER_BACKFILL_YEARS: ${IBERGRID_WORKER_BACKFILL_YEARS:-2}
      IBERGRID_WORKER_RECONCILIATION_DAYS: ${IBERGRID_WORKER_RECONCILIATION_DAYS:-14}
    volumes:
      - app_data:/app/data
      - app_artifacts:/app/artifacts
      - mlruns_data:/app/mlruns
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      IBERGRID_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      IBERGRID_DATA_ROOT: /app/data
      IBERGRID_ARTIFACTS_ROOT: /app/artifacts
      IBERGRID_MLFLOW_TRACKING_URI: http://mlflow:5000
      IBERGRID_MLFLOW_EXPERIMENT_NAME: ${IBERGRID_MLFLOW_EXPERIMENT_NAME:-ibergrid-production}
      IBERGRID_HORIZON_HOURS: ${IBERGRID_HORIZON_HOURS:-168}
      IBERGRID_ENCODER_HOURS: ${IBERGRID_ENCODER_HOURS:-336}
      IBERGRID_RETRAIN_BATCH_SIZE: ${IBERGRID_RETRAIN_BATCH_SIZE:-64}
      IBERGRID_RETRAIN_NUM_WORKERS: ${IBERGRID_RETRAIN_NUM_WORKERS:-2}
      IBERGRID_RETRAIN_EPOCHS: ${IBERGRID_RETRAIN_EPOCHS:-8}
      IBERGRID_WORKER_REFRESH_DAYS: ${IBERGRID_WORKER_REFRESH_DAYS:-30}
      IBERGRID_WORKER_BACKFILL_YEARS: ${IBERGRID_WORKER_BACKFILL_YEARS:-2}
      IBERGRID_WORKER_RECONCILIATION_DAYS: ${IBERGRID_WORKER_RECONCILIATION_DAYS:-14}
      IBERGRID_WORKER_DAILY_JOB_HOUR: ${IBERGRID_WORKER_DAILY_JOB_HOUR:-7}
      IBERGRID_WORKER_DAILY_JOB_MINUTE: ${IBERGRID_WORKER_DAILY_JOB_MINUTE:-10}
      IBERGRID_WORKER_WEEKLY_JOB_DAY_OF_WEEK: ${IBERGRID_WORKER_WEEKLY_JOB_DAY_OF_WEEK:-sun}
      IBERGRID_WORKER_WEEKLY_JOB_HOUR: ${IBERGRID_WORKER_WEEKLY_JOB_HOUR:-5}
      IBERGRID_WORKER_WEEKLY_JOB_MINUTE: ${IBERGRID_WORKER_WEEKLY_JOB_MINUTE:-30}
      IBERGRID_WORKER_RECONCILIATION_JOB_HOUR: ${IBERGRID_WORKER_RECONCILIATION_JOB_HOUR:-6}
      IBERGRID_WORKER_RECONCILIATION_JOB_MINUTE: ${IBERGRID_WORKER_RECONCILIATION_JOB_MINUTE:-45}
    volumes:
      - app_data:/app/data
      - app_artifacts:/app/artifacts
      - mlruns_data:/app/mlruns
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  mlflow_data:
  mlruns_data:
  app_data:
  app_artifacts:
  caddy_data:
  caddy_config:
